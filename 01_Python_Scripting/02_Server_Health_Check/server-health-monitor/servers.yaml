servers:
  - name: "Production API"
    url: "https://api.example.com/health"
    type: "http"
    expected_status: 200
    timeout: 5

  - name: "Database Server"
    host: "db.example.com"
    port: 5432
    type: "tcp"

  - name: "Web Server"
    url: "https://www.example.com"
    type: "http"
    expected_status: 200
    timeout: 10

  - name: "Local Machine"
    type: "system"
    thresholds:
      cpu_percent: 80
      memory_percent: 85
      disk_percent: 90

alerts:
  slack_webhook: "${SLACK_WEBHOOK_URL}"
  email_enabled: true
  email_to: "bamclueaws@gmail.com"